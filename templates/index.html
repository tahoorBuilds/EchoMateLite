<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoMateLite</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            background: linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-family:Arial,sans-serif;
        }

        .hero-card{
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding:40px;
            border-radius:20px;
            text-align:center;
            width:90%;
            max-width:600px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            font-size:3rem;
            font-weight:bold;
        }

        p{
            font-size:1.2rem;
            margin-bottom:30px;
        }

        .btn-custom{
            padding:12px 30px;
            border-radius:50px;
            font-weight:bold;
            margin:10px;
        }
    </style>
</head>
<body>

    <div class="hero-card">
        <h1>🚀 EchoMateLite</h1>

        <p>
            Connect, Share and Discover with people around the world.
        </p>

        <a href="/login" class="btn btn-light btn-custom">
            Login
        </a>

        <a href="/register" class="btn btn-primary btn-custom">
            Register
        </a>
    </div>

</body>
</html>
