<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <div class="card p-4 shadow">

        <h1>User Profile</h1>

        <p><strong>User ID:</strong> {{ session['user_id'] }}</p>

        <p><strong>Username:</strong> {{ user[0] }}</p>

        {% if user[1] %}

        <img
            src="{{ url_for('static', filename='profile_pics/' + user[1]) }}"
            width="150"
            height="150"
            class="rounded-circle mb-3">

        {% endif %}

    <p>
        <strong>Bio:</strong>
    </p>

    <p class="text-muted">
        {{ user[2] if user[2] else "No bio added yet." }}
    </p>

    <a href="/editbio" class="btn btn-warning mb-3">
        ✏️ Edit Bio
    </a>

        <hr>

        <form action="/uploadprofilepic"
              method="POST"
              enctype="multipart/form-data">

            <input
                type="file"
                name="profile_pic"
                class="form-control mb-2"
                required>

            <button
                type="submit"
                class="btn btn-success">
                Upload Profile Picture
            </button>

        </form>

        <hr>

        <h2>My Posts</h2>

        {% for post in posts %}

        <div class="card mb-3">
            <div class="card-body">

                <p>{{ post[1] }}</p>

                <a href="/editpost/{{ post[0] }}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a href="/deletepost/{{ post[0] }}"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>

            </div>
        </div>

        {% endfor %}

        <a href="/dashboard" class="btn btn-primary">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
