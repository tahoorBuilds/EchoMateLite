<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <style>
body{
    background:#f5f7fb;
}

.profile-card{
    border:none;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.profile-pic{
    width:150px;
    height:150px;
    object-fit:cover;
    border:4px solid #0d6efd;
}

.post-card{
    border:none;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.action-btn{
    border-radius:50px;
}
</style>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container-fluid px-3 mt-5">

    <div class="card profile-card p-4">

        <h1 class="fw-bold text-primary">
            👤 My Profile
        </h1>

        <p><strong>User ID:</strong> {{ session['user_id'] }}</p>

        <p><strong>Username:</strong> {{ user[0] }}</p>

        {% if user[1] %}

        <img
            src="{{ url_for('static', filename='profile_pics/' + user[1]) }}"
            width="150"
            height="150"
            class="rounded-circle profile-pic mb-3"

        {% endif %}

    <p>
        <strong>Bio:</strong>
    </p>

    <p class="text-muted">
        {{ user[2] if user[2] else "No bio added yet." }}
    </p>

    <a href="/editbio" class="btn btn-warning mb-3">
        ✏️ Edit Bio
    </a>

        <hr>

        <form action="/uploadprofilepic"
              method="POST"
              enctype="multipart/form-data">

            <input
                type="file"
                name="profile_pic"
                class="form-control mb-2"
                required>

            <button
                type="submit"
                class="btn btn-success">
                Upload Profile Picture
            </button>

        </form>

        <hr>

        <h2 class="fw-bold mt-4">
            📝 My Posts
        </h2>

        {% for post in posts %}

        <div class="card post-card mb-3">
            <div class="card-body">

                <p>{{ post[1] }}</p>

                <a href="/editpost/{{ post[0] }}"
                   class="btn btn-warning action-btn"
                    Edit
                </a>

                <a href="/deletepost/{{ post[0] }}"
                   class="btn btn-danger action-btn"
                    Delete
                </a>

            </div>
        </div>

        {% endfor %}

        <a href="/dashboard" class="btn btn-primary action-btn w-100">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
