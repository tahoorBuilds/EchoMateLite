<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chat</title>
    

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(
        135deg,
        #dbeafe,
        #eff6ff,
        #f8fafc
    );
    min-height:100vh;
}
.main-card{
    background:#ffffff;
    border:none;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}
.menu-btn{
    border-radius:50px;
}
.stat-blue{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:20px;
}

.stat-green{
    background:#16a34a;
    color:white;
    border:none;
    border-radius:20px;
}

.stat-yellow{
    background:#facc15;
    color:black;
    border:none;
    border-radius:20px;
}
</style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
            🚀 EchoMateLite
        </span>
    </div>
</nav>

    <div class="container-fluid px-3 mt-5">

    <div class="card main-card p-4">

        <div class="card-header">
            <h3>💬 Chat</h3>
        </div>

        <div class="card-body" style="height:500px; overflow-y:auto;">

            {% if messages %}

                {% for message in messages %}

                <div class="mb-3">

                    <strong>
                        {{ message[2] }}
                    </strong>

                    <br>

                    <div class="border rounded p-2 bg-light">

                        {{ message[1] }}

                    </div>

                    <small class="text-muted">
                        {{ message[4] }}
                    </small>

                    <br>

                    {% if message[3] == session["user_id"] %}

                    <a href="/deletemessage/{{ message[0] }}/{{ user_id }}"
                       class="btn btn-danger btn-sm mt-1"
                       onclick="return confirm('Unsend this message?')">
                        🗑️ Unsend
                    </a>

                    {% endif %}

                </div>

                {% endfor %}

            {% else %}

                <div class="alert alert-warning">
                    No messages yet.
                </div>

            {% endif %}

        </div>

        <div class="card-footer">

            <form action="/sendmessage/{{ user_id }}" method="POST">

                <div class="input-group">

                    <input
                        type="text"
                        name="message"
                        class="form-control"
                        placeholder="Type a message..."
                        required>

                    <button
                        type="submit"
                        class="btn btn-primary">
                        Send
                    </button>

                </div>

            </form>

        </div>

    </div>

    <br>

    <a href="/inbox" class="btn btn-secondary">
        ← Back to Inbox
    </a>

</div>

</body>
</html>
