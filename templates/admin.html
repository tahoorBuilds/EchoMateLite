<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    body{
    background: linear-gradient(
        135deg,
        #dbeafe,
        #eff6ff,
        #f8fafc
    );
    min-height:100vh;
}

    .main-card {
        border: none;
        border-radius: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, .08);
    }
    
.menu-btn{
    border-radius:50px;
}

.stat-blue{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:20px;
}

.stat-green{
    background:#16a34a;
    color:white;
    border:none;
    border-radius:20px;
}

.stat-yellow{
    background:#facc15;
    color:black;
    border:none;
    border-radius:20px;
}
</style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
            🚀 EchoMateLite
        </span>
    </div>
</nav>

<div class="container-fluid px-3 mt-5">

    <h1 class="mb-4 text-center">Admin Dashboard</h1>

    <div class="row">

        <div class="col-md-6">
            <div class="card shadow mb-4">
                <div class="card-body text-center">
                    <h5>Total Users</h5>
                    <h2>{{ total_users }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card main-card mb-4">
                <div class="card-body text-center">
                    <h5>Total Posts</h5>
                    <h2>{{ total_posts }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow mb-4">
                <div class="card-body text-center">
                    <h5>Total Likes</h5>
                    <h2>{{ total_likes }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow mb-4">
                <div class="card-body text-center">
                    <h5>Total Comments</h5>
                    <h2>{{ total_comments }}</h2>
                </div>
            </div>
        </div>

    </div>

    <div class="text-center">
        <a href="/dashboard" class="btn btn-primary">
            Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
