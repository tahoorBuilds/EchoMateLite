<!DOCTYPE html>
<html lang="en">
<head>
    <style>
body{
    background: linear-gradient(
        135deg,
        #dbeafe,
        #eff6ff,
        #f8fafc
    );
    min-height:100vh;
}

.main-card{
    border:none;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.app-btn{
    border-radius:50px;
}

.menu-btn{
    border-radius:50px;
}

.stat-blue{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:20px;
}

.stat-green{
    background:#16a34a;
    color:white;
    border:none;
    border-radius:20px;
}

.stat-yellow{
    background:#facc15;
    color:black;
    border:none;
    border-radius:20px;
}
</style>
    <title>Login</title>
    

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
            🚀 EchoMateLite
        </span>
    </div>
</nav>

    <div class="container-fluid px-3 mt-5">

    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">

        <h1 class="text-center mb-4">Login</h1>

        <form method="POST">

            <input
                type="email"
                name="email"
                class="form-control mb-3"
                placeholder="Email"
                required>

            <input
                type="password"
                name="password"
                class="form-control mb-3"
                placeholder="Password"
                required>

            <button
                type="submit"
                class="btn btn-primary w-100">
                Login
            </button>

        </form>

        <hr>

        <a href="/register" class="btn btn-success w-100">
            Create New Account
        </a>

    </div>

</div>

</body>
</html>
