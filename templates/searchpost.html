<!DOCTYPE html>
<html lang="en">
<head>
    <title>Search Posts</title>
    <style>
body{
    background: linear-gradient(
        135deg,
        #dbeafe,
        #eff6ff,
        #f8fafc
    );
    min-height:100vh;
}

.main-card{
    border:none;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.app-btn{
    border-radius:50px;
}

.menu-btn{
    border-radius:50px;
}

.stat-blue{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:20px;
}

.stat-green{
    background:#16a34a;
    color:white;
    border:none;
    border-radius:20px;
}

.stat-yellow{
    background:#facc15;
    color:black;
    border:none;
    border-radius:20px;
}
</style>
    

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
            🚀 EchoMateLite
        </span>
    </div>
</nav>

    <div class="container-fluid px-3 mt-5">

    <div class="card main-card p-4">

        <h2>🔎 Search Posts</h2>

        <form method="POST">

            <input
                type="text"
                name="keyword"
                class="form-control"
                placeholder="Search posts..."
                required>

            <br>

            <button
                type="submit"
                class="btn btn-primary">
                Search
            </button>

        </form>

        <hr>

{% if posts %}

    {% for post in posts %}

    <div class="card mb-3">
        <div class="card-body">

            <h6>👤 {{ post[2] }}</h6>

            <p>{{ post[1] }}</p>

            <a href="/user/{{ post[3] }}"
               class="btn btn-primary btn-sm">
               View Profile
            </a>

        </div>
    </div>

    {% endfor %}

{% else %}

    <div class="alert alert-warning">
        No posts found.
    </div>

{% endif %}

</body>
</html>
