<!DOCTYPE html>
<html>
<head>
    <title>Search Posts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <div class="card shadow p-4">

        <h2>🔎 Search Posts</h2>

        <form method="POST">

            <input
                type="text"
                name="keyword"
                class="form-control"
                placeholder="Search posts..."
                required>

            <br>

            <button
                type="submit"
                class="btn btn-primary">
                Search
            </button>

        </form>

        <hr>

{% if posts %}

    {% for post in posts %}

    <div class="card mb-3">
        <div class="card-body">

            <h6>👤 {{ post[2] }}</h6>

            <p>{{ post[1] }}</p>

            <a href="/user/{{ post[3] }}"
               class="btn btn-primary btn-sm">
               View Profile
            </a>

        </div>
    </div>

    {% endfor %}

{% else %}

    <div class="alert alert-warning">
        No posts found.
    </div>

{% endif %}

</body>
</html>
