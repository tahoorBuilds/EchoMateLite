```
<div class="card main-card p-4">

    <h2>❤️ Users Who Liked This Post</h2>

    <hr>

    {% if users %}

        {% for user in users %}

            <div class="alert alert-light border">
                👤 {{ user[0] }}
            </div>

        {% endfor %}

    {% else %}

        <div class="alert alert-warning">
            No likes yet.
        </div>

    {% endif %}

    <a href="/feed" class="btn btn-primary">
        Back to Feed
    </a>

</div>

</div>
